<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding Form - AIO</title>
    <style>
        :root {
            --primary: #ff5c35;
            --primary-dark: #e8481e;
            --bg: #f5f8fa;
            --card: #ffffff;
            --border: #e5e8ed;
            --text: #1a1f36;
            --text-muted: #6b7c93;
            --success: #00c48c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px 16px; }
        .container { max-width: 680px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 24px; }
        .header img { height: 48px; margin-bottom: 12px; }
        .header h1 { font-size: 24px; color: var(--text); }
        .header .sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .card { background: var(--card); border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section { margin-bottom: 28px; }
        .section h2 { font-size: 16px; color: var(--primary); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .field input, .field textarea, .field select {
            width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit;
        }
        .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--primary); }
        .field textarea { min-height: 80px; resize: vertical; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        @media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }
        .btn { display: inline-block; padding: 14px 28px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { background: var(--primary-dark); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .info-banner { background: #f0fdf4; border-left: 4px solid var(--success); padding: 14px 16px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; color: #065f46; }
        .error-banner { background: #fef2f2; border-left: 4px solid #dc2626; padding: 14px 16px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; color: #991b1b; }
        .booking-summary { background: #f9fafb; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 20px; font-size: 13px; color: var(--text-muted); }
        .booking-summary strong { color: var(--text); font-weight: 600; }
        .hidden { display: none; }

        .checkbox-group, .radio-group { display: flex; flex-direction: column; gap: 10px; }
        .checkbox-item, .radio-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 12px;
            border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
            font-size: 14px; transition: all 0.15s;
        }
        .checkbox-item:hover, .radio-item:hover { border-color: var(--primary); background: #fff8f5; }
        .checkbox-item input, .radio-item input { margin: 0; cursor: pointer; width: 18px; height: 18px; accent-color: var(--primary); }
        .checkbox-item.with-other { flex-wrap: wrap; }
        .checkbox-item .other-input { flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; }
        .required-mark { color: #dc2626; margin-left: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="/aio-logo.png" alt="AIO" onerror="this.style.display='none'">
            <h1>Onboarding Form</h1>
            <div class="sub">Please complete this form before your onboarding call</div>
        </div>

        <div id="loadingState" class="card" style="text-align:center;padding:60px 20px;">
            <div style="color:var(--text-muted);">Loading…</div>
        </div>

        <div id="errorState" class="card hidden">
            <div class="error-banner" id="errorMessage">Invalid or expired link.</div>
        </div>

        <div id="submittedState" class="card hidden">
            <div class="info-banner">
                ✓ Thank you! Your onboarding form has been submitted. Your AIO Buddy will be in touch shortly.
            </div>
        </div>

        <div id="formState" class="card hidden">
            <div class="booking-summary" id="bookingSummary"></div>

            <form id="onboardingForm" onsubmit="event.preventDefault(); submitForm();">
                <div class="section">
                    <h2>Restaurant Details</h2>
                    <div class="field">
                        <label>Restaurant Name<span class="required-mark">*</span></label>
                        <input type="text" id="restaurant_name" required placeholder="Restaurant name">
                    </div>
                </div>

                <div class="section">
                    <h2>Required Modules</h2>

                    <div class="field">
                        <label>Order &amp; Pay</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="KIOSK"> KIOSK</label>
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="mPOS (handheld)"> mPOS (handheld)</label>
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="Online Ordering"> Online Ordering</label>
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="CFD (Customer Facing Display)"> CFD (Customer Facing Display)</label>
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="Door Dash Drive"> Door Dash Drive</label>
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="Mobile App"> Mobile App</label>
                            <label class="checkbox-item"><input type="checkbox" name="order_pay" value="QR Code"> QR Code</label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Third Party Integrations<span class="required-mark">*</span></label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="third_party" value="Door dash"> Door dash</label>
                            <label class="checkbox-item"><input type="checkbox" name="third_party" value="UberEats"> UberEats</label>
                            <label class="checkbox-item"><input type="checkbox" name="third_party" value="Grub Hub"> Grub Hub</label>
                            <label class="checkbox-item"><input type="checkbox" name="third_party" value="All of the above"> All of the above</label>
                            <label class="checkbox-item with-other">
                                <input type="checkbox" name="third_party_other_check" id="thirdPartyOtherCheck">
                                <input type="text" class="other-input" id="thirdPartyOtherText" placeholder="Other">
                            </label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Marketing</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="marketing" value="Loyalty (Points Based)"> Loyalty (Points Based)</label>
                            <label class="checkbox-item"><input type="checkbox" name="marketing" value="E- Gift Cards"> E- Gift Cards</label>
                            <label class="checkbox-item"><input type="checkbox" name="marketing" value="Physical Gift Cards"> Physical Gift Cards</label>
                            <label class="checkbox-item"><input type="checkbox" name="marketing" value="Website"> Website</label>
                            <label class="checkbox-item"><input type="checkbox" name="marketing" value="Promo Codes"> Promo Codes</label>
                            <label class="checkbox-item"><input type="checkbox" name="marketing" value="Deals"> Deals</label>
                            <label class="checkbox-item with-other">
                                <input type="checkbox" name="marketing_other_check" id="marketingOtherCheck">
                                <input type="text" class="other-input" id="marketingOtherText" placeholder="Other">
                            </label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Catering Integration<span class="required-mark">*</span></label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="catering" value="EZ Cater"> EZ Cater</label>
                            <label class="checkbox-item"><input type="checkbox" name="catering" value="Website Order Form"> Website Order Form</label>
                            <label class="checkbox-item"><input type="checkbox" name="catering" value="AIO's Catering Module"> AIO's Catering Module</label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Breaks<span class="required-mark">*</span></label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="breaks" value="Compliant" required> Compliant</label>
                            <label class="radio-item"><input type="radio" name="breaks" value="Non - Compliant"> Non - Compliant</label>
                            <label class="radio-item"><input type="radio" name="breaks" value="No Breaks"> No Breaks</label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Other<span class="required-mark">*</span></label>
                        <div class="checkbox-group">
                            <label class="checkbox-item"><input type="checkbox" name="other_modules" value="Inventory"> Inventory</label>
                            <label class="checkbox-item"><input type="checkbox" name="other_modules" value="Accounting"> Accounting</label>
                            <label class="checkbox-item"><input type="checkbox" name="other_modules" value="Payroll"> Payroll</label>
                            <label class="checkbox-item"><input type="checkbox" name="other_modules" value="Tip Pooling"> Tip Pooling</label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Additional Notes / Feedback</label>
                        <textarea id="additional_notes" placeholder="Anything else we should know..."></textarea>
                    </div>
                </div>

                <div class="section">
                    <button type="submit" class="btn" id="submitBtn">Submit Onboarding Form</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = window.location.pathname.split("/").pop();
        let booking = null;

        async function loadBooking() {
            try {
                const res = await fetch("/api/public/onboarding/" + token);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    showError(err.error || "Invalid or expired link.");
                    return;
                }
                booking = await res.json();
                if (booking.customer_form_submitted_at) {
                    document.getElementById("loadingState").classList.add("hidden");
                    document.getElementById("submittedState").classList.remove("hidden");
                    return;
                }
                renderForm();
            } catch (e) {
                showError("Could not load form. Please try again.");
            }
        }

        function showError(msg) {
            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("errorMessage").textContent = msg;
            document.getElementById("errorState").classList.remove("hidden");
        }

        function renderForm() {
            const start = new Date(booking.start_datetime);
            const dateStr = start.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            const timeStr = start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById("bookingSummary").innerHTML =
                "<strong>" + (booking.company_name || "Your booking") + "</strong><br>" +
                "Onboarding call on <strong>" + dateStr + " at " + timeStr + "</strong>";

            // Pre-fill the editable restaurant name from the booking
            document.getElementById("restaurant_name").value = booking.company_name || "";

            document.getElementById("loadingState").classList.add("hidden");
            document.getElementById("formState").classList.remove("hidden");
        }

        function getCheckedValues(name) {
            return Array.from(document.querySelectorAll('input[name="' + name + '"]:checked')).map(cb => cb.value);
        }

        function getRadioValue(name) {
            const el = document.querySelector('input[name="' + name + '"]:checked');
            return el ? el.value : "";
        }

        async function submitForm() {
            const btn = document.getElementById("submitBtn");

            // Required-field validation (matches the form's * marks)
            const restaurantName = document.getElementById("restaurant_name").value.trim();
            if (!restaurantName) { alert("Please enter the Restaurant Name."); return; }
            const thirdParty = getCheckedValues("third_party");
            const thirdPartyOther = document.getElementById("thirdPartyOtherCheck").checked
                ? document.getElementById("thirdPartyOtherText").value.trim() : "";
            if (thirdParty.length === 0 && !thirdPartyOther) {
                alert("Please select at least one Third Party Integration."); return;
            }
            const catering = getCheckedValues("catering");
            if (catering.length === 0) { alert("Please select a Catering Integration option."); return; }
            const breaks = getRadioValue("breaks");
            if (!breaks) { alert("Please select a Breaks option."); return; }
            const otherModules = getCheckedValues("other_modules");
            if (otherModules.length === 0) { alert("Please select at least one option under Other."); return; }

            btn.disabled = true;
            btn.textContent = "Submitting…";

            const marketing = getCheckedValues("marketing");
            const marketingOther = document.getElementById("marketingOtherCheck").checked
                ? document.getElementById("marketingOtherText").value.trim() : "";
            if (marketingOther) marketing.push("Other: " + marketingOther);
            if (thirdPartyOther) thirdParty.push("Other: " + thirdPartyOther);

            const payload = {
                restaurant_name: restaurantName,
                order_pay: getCheckedValues("order_pay"),
                third_party_integrations: thirdParty,
                marketing: marketing,
                catering_integration: catering,
                breaks: breaks,
                other: otherModules,
                additional_notes: document.getElementById("additional_notes").value,
            };

            try {
                const res = await fetch("/api/public/onboarding/" + token, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById("formState").classList.add("hidden");
                    document.getElementById("submittedState").classList.remove("hidden");
                    window.scrollTo(0, 0);
                } else {
                    alert("Failed to submit: " + (data.error || "Unknown error"));
                    btn.disabled = false;
                    btn.textContent = "Submit Onboarding Form";
                }
            } catch (e) {
                alert("Network error: " + e.message);
                btn.disabled = false;
                btn.textContent = "Submit Onboarding Form";
            }
        }

        loadBooking();
    </script>
</body>
</html>
